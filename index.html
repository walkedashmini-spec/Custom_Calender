<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Calendar </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container my-4">
  <h1 class="text-center mb-4">Your Calendar</h1>
  <div class="d-flex justify-content-between mb-3">
    <button id="prevBtn" class="btn btn-primary">Previous</button>
    <h3 id="monthYear"></h3>
    <button id="nextBtn" class="btn btn-primary">Next</button>
   
  </div>

  

  <table class="table table-bordered text-center">
    <thead class="table-secondary">
      <tr>
        <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th>
        <th>Thu</th><th>Fri</th><th>Sat</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>
</div>

<div id="sidebar" class="sidebar">
  <h4>Holiday / Event Details</h4>
  <div id="holidayInfo"></div>

  <h5 class="mt-3">Manage Event</h5>
  <input type="date" id="eventDate" class="form-control mb-2">
  <input type="text" id="eventDesc" class="form-control mb-2" placeholder="Event description">
  <div class="d-flex">
    <button id="addEventBtn" class="btn btn-success me-2">Add Event</button>
    <button id="removeEventBtn" class="btn btn-danger">Remove Event</button>
  </div>
  <button id="closeSidebar" class="btn btn-secondary mt-3">Close</button>
</div>
<div id="allEventsSidebar" class="sidebar">
  <h4>All Events for <span id="eventsMonthYear"></span></h4>
  <div id="allEventsList"></div>
  <button id="closeAllEventsSidebar" class="btn btn-secondary mt-3">Close</button>
</div>
<button id="allEventsBtn" class="btn btn-info">All Events</button>

<script src="demo.js"></script>
</body>
</html>
